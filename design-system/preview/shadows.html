<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
body{background:#000;color:#fff;font-family:"Montserrat",sans-serif;margin:0;padding:30px;height:100vh;box-sizing:border-box;display:flex;align-items:center;justify-content:space-between;gap:18px}
.c{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.box{width:68px;height:68px;border-radius:12px;background:#171717;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.02em;text-align:center;line-height:1.4}
.val{font-size:10px;color:#fff;font-weight:600}
</style></head><body>
<div class="c"><div class="box" style="box-shadow:0 20px 44px rgba(0,0,0,0.34), 0 0 0 1px rgba(255,255,255,0.08)"></div><span class="val">flight</span><span class="lbl">capture→feed</span></div>
<div class="c"><div class="box" style="box-shadow:0 16px 32px rgba(0,0,0,0.26)"></div><span class="val">toast</span><span class="lbl">system feedback</span></div>
<div class="c"><div class="box" style="box-shadow:0 10px 28px rgba(255,255,255,0.16);background:#fff09c"></div><span class="val">button glow</span><span class="lbl">primary result</span></div>
<div class="c"><div class="box" style="box-shadow:0 -18px 48px rgba(0,0,0,0.42)"></div><span class="val">sheet ↑</span><span class="lbl">publish sheet</span></div>
<div class="c"><div class="box" style="box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);background:rgba(255,255,255,.06)"></div><span class="val">inset hair</span><span class="lbl">card outline</span></div>
</body></html>
