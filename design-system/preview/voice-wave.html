<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@600&family=Montserrat:wght@500;600&display=swap" rel="stylesheet"><style>
@font-face{font-family:"Alimama ShuHeiTi";src:url("../fonts/AlimamaShuHeiTi-Bold.otf") format("opentype");font-weight:700 900;font-display:swap}

body{background:#000;color:#fff;font-family:"Alimama ShuHeiTi","Noto Sans SC","PingFang SC",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:14px}
h4{margin:0;font-size:10px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;font-family:"Montserrat",sans-serif}
.frame{background:#50557b;border-radius:24px;padding:18px 16px;display:flex;flex-direction:column;gap:12px}
.wave{display:flex;gap:3px;align-items:flex-end;height:42px}
.bar{width:3px;border-radius:2px;background:linear-gradient(180deg,rgba(255,240,156,0.96),rgba(178,241,255,0.92));animation:p 1.2s ease-in-out infinite}
@keyframes p{0%,100%{height:30%}50%{height:100%}}
.meta{display:flex;justify-content:space-between;font-family:"Montserrat",sans-serif;font-size:12px;color:rgba(255,255,255,.8);font-weight:500}
.lbl{color:rgba(255,255,255,.6);font-size:11px}
</style></head><body>
<h4>Voice capture · wave gradient yellow→cyan</h4>
<div class="frame">
<div class="wave" id="w"></div>
<div class="meta"><span>0:08</span><span class="lbl">正在录音</span></div>
</div>
<script>
const w=document.getElementById('w');
for(let i=0;i<48;i++){const b=document.createElement('div');b.className='bar';b.style.animationDelay=(i*0.05%1.2)+'s';b.style.height=(20+Math.random()*70)+'%';w.appendChild(b)}
</script>
</body></html>
