<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
body{background:#000;color:#fff;font-family:"Montserrat",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:14px}
.row{display:flex;gap:16px;align-items:flex-end}
.c{display:flex;flex-direction:column;gap:6px;align-items:center}
.sw{width:68px;height:68px;background:rgba(255,255,255,0.1);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.04em}
.val{font-size:11px;color:#fff;font-weight:600}
h4{margin:0;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<h4>Radius · 4 / 6 / 12 / 16 / 24 / 32 / 999</h4>
<div class="row">
<div class="c"><div class="sw" style="border-radius:4px"></div><span class="val">4</span><span class="lbl">xs</span></div>
<div class="c"><div class="sw" style="border-radius:6px"></div><span class="val">6</span><span class="lbl">sm</span></div>
<div class="c"><div class="sw" style="border-radius:12px"></div><span class="val">12</span><span class="lbl">md · thumb</span></div>
<div class="c"><div class="sw" style="border-radius:16px"></div><span class="val">16</span><span class="lbl">lg · card</span></div>
<div class="c"><div class="sw" style="border-radius:24px"></div><span class="val">24</span><span class="lbl">xl · sheet</span></div>
<div class="c"><div class="sw" style="border-radius:32px"></div><span class="val">32</span><span class="lbl">2xl · treasure</span></div>
<div class="c"><div class="sw" style="border-radius:999px"></div><span class="val">999</span><span class="lbl">pill</span></div>
</div>
</body></html>
