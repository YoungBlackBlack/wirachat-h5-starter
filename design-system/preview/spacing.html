<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
body{background:#000;color:#fff;font-family:"Montserrat",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:10px}
.row{display:flex;gap:8px;align-items:center;height:20px}
.bar{background:#fff09c;height:12px;border-radius:2px}
.lbl{font-size:10px;color:rgba(255,255,255,.5);letter-spacing:.04em;width:40px}
.val{font-size:11px;color:#fff;font-weight:600;font-family:"Montserrat",sans-serif;width:48px}
h4{margin:0;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.edge{margin-top:8px;background:rgba(255,255,255,.06);border-radius:12px;padding:10px 20px;display:flex;justify-content:space-between;font-size:11px}
.edge span:last-child{color:#fff09c;font-weight:600}
</style></head><body>
<h4>Spacing · 4-step scale</h4>
<div class="row"><span class="lbl">--1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
<div class="row"><span class="lbl">--2</span><div class="bar" style="width:8px"></div><span class="val">8px</span></div>
<div class="row"><span class="lbl">--3</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
<div class="row"><span class="lbl">--4</span><div class="bar" style="width:16px"></div><span class="val">16px</span></div>
<div class="row"><span class="lbl">--5</span><div class="bar" style="width:20px"></div><span class="val">20px</span></div>
<div class="row"><span class="lbl">--6</span><div class="bar" style="width:24px"></div><span class="val">24px</span></div>
<div class="row"><span class="lbl">--8</span><div class="bar" style="width:32px"></div><span class="val">32px</span></div>
<div class="edge"><span style="color:rgba(255,255,255,.6)">edge padding</span><span>clamp(16px, 4vw, 24px)</span></div>
</body></html>
