<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link rel="stylesheet" href="preview.css"><style>
body{background:#000;color:#fff;font-family:"PingFang SC","SF Pro Text",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;gap:16px;justify-content:center}
.row{display:flex;gap:12px;align-items:flex-end}
.c{display:flex;flex-direction:column;gap:8px}
.sw{width:80px;height:80px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
.lbl{font-size:11px;color:rgba(255,255,255,.5);font-family:"Montserrat",sans-serif}
.val{font-size:12px;color:#fff;font-weight:600;font-family:"Montserrat",sans-serif}
</style></head><body>
<div class="row">
<div class="c"><div class="sw" style="background:#000000"></div><span class="lbl">bg</span><span class="val">#000000</span></div>
<div class="c"><div class="sw" style="background:#0d0d0d"></div><span class="lbl">bg-elevated</span><span class="val">#0D0D0D</span></div>
<div class="c"><div class="sw" style="background:#171717"></div><span class="lbl">bg-card</span><span class="val">#171717</span></div>
<div class="c"><div class="sw" style="background:#1b1b1b"></div><span class="lbl">bg-card-muted</span><span class="val">#1B1B1B</span></div>
<div class="c"><div class="sw" style="background:#353535"></div><span class="lbl">bg-mystery</span><span class="val">#353535</span></div>
<div class="c"><div class="sw" style="background:#50557b"></div><span class="lbl">bg-voice</span><span class="val">#50557B</span></div>
</div>
</body></html>
