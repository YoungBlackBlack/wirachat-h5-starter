<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet"><style>
@font-face{font-family:"Alimama ShuHeiTi";src:url("../fonts/AlimamaShuHeiTi-Bold.otf") format("opentype");font-weight:700 900;font-display:swap}

body{background:#000;color:#fff;font-family:"Alimama ShuHeiTi","Noto Sans SC","PingFang SC",sans-serif;margin:0;padding:28px;height:100vh;box-sizing:border-box;display:flex;align-items:center;gap:26px;justify-content:space-around}
.block{display:flex;flex-direction:column;align-items:center;gap:10px}
.lbl{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;font-family:"Montserrat",sans-serif}
.mark{width:60px;height:60px}
.topbar{background:rgba(0,0,0,.5);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.04);padding:10px 14px;border-radius:12px;display:flex;align-items:center;gap:10px}
.topbar img{width:26px;height:26px}
.topbar .t{font-weight:900;font-size:16px}
</style></head><body>
<div class="block"><img class="mark" src="../assets/logo-rounded.svg" alt="logo"><span class="lbl">app mark</span></div>
<div class="block"><div class="topbar"><img src="../assets/logo-rounded.svg"><span class="t">品牌名占位</span></div><span class="lbl">brand lockup</span></div>
</body></html>
