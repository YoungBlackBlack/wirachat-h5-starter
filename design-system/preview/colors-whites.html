<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
body{background:#000;color:#fff;font-family:"PingFang SC",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;gap:14px;justify-content:center}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.c{display:flex;flex-direction:column;gap:6px;align-items:center}
.sw{width:64px;height:64px;border-radius:10px;background:rgba(255,255,255,var(--a));box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}
.a{font-size:11px;color:rgba(255,255,255,.5);font-family:"Montserrat",sans-serif;letter-spacing:.04em}
.v{font-size:11px;color:#fff;font-weight:600;font-family:"Montserrat",sans-serif}
h4{margin:0 0 2px;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
</style></head><body>
<h4>Transparent whites over #000 — the surface system</h4>
<div class="row">
<div class="c"><div class="sw" style="--a:.05"></div><span class="a">05%</span></div>
<div class="c"><div class="sw" style="--a:.06"></div><span class="a">06%</span></div>
<div class="c"><div class="sw" style="--a:.08"></div><span class="a">08%</span></div>
<div class="c"><div class="sw" style="--a:.09"></div><span class="a">09%</span></div>
<div class="c"><div class="sw" style="--a:.10"></div><span class="a">10%</span></div>
<div class="c"><div class="sw" style="--a:.14"></div><span class="a">14%</span></div>
<div class="c"><div class="sw" style="--a:.18"></div><span class="a">18%</span></div>
<div class="c"><div class="sw" style="--a:.20"></div><span class="a">20%</span></div>
</div>
<h4>Ink — stepped by alpha</h4>
<div class="row" style="gap:20px">
<div class="c"><span style="color:#fff;font-size:18px;font-weight:600">Aa 100</span><span class="a">fg1 · 主文字</span></div>
<div class="c"><span style="color:rgba(255,255,255,.8);font-size:18px;font-weight:600">Aa 80</span><span class="a">fg2 · 正文</span></div>
<div class="c"><span style="color:rgba(255,255,255,.5);font-size:18px;font-weight:600">Aa 50</span><span class="a">fg3 · 次要</span></div>
<div class="c"><span style="color:rgba(255,255,255,.3);font-size:18px;font-weight:600">Aa 30</span><span class="a">fg4 · 占位</span></div>
</div>
</body></html>
