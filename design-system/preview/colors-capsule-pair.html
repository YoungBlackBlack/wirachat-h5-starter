<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
@font-face{font-family:"Alimama ShuHeiTi";src:url("../fonts/AlimamaShuHeiTi-Bold.otf") format("opentype");font-weight:700 900;font-display:swap}

body{background:#000;color:#fff;font-family:"PingFang SC",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;gap:18px;justify-content:center}
.pair{display:flex;gap:16px}
.cap{flex:1;border-radius:999px;padding:14px 0;text-align:center;position:relative}
.cap b{font-family:"Alimama ShuHeiTi","Noto Sans SC","PingFang SC",sans-serif;font-weight:900;font-size:18px;letter-spacing:1px}
.count{position:absolute;top:-9px;right:18px;padding:3px 8px;border-radius:10px;font-family:"Montserrat",sans-serif;font-size:12px;font-weight:500}
.row{display:flex;gap:14px;align-items:center}
.sw{width:46px;height:46px;border-radius:10px}
.lbl{font-size:11px;color:rgba(255,255,255,.5);font-family:"Montserrat",sans-serif}
.val{font-size:12px;color:#fff;font-weight:600;font-family:"Montserrat",sans-serif}
.c{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
</style></head><body>
<div class="pair">
<div class="cap" style="background:#41390f;color:#fff09c"><span class="count" style="background:#f4e490;color:#41390f">2344人</span><b>我想换</b></div>
<div class="cap" style="background:#083640;color:#b2f1ff"><span class="count" style="background:#9bdbea;color:#083640">1290人</span><b>下一个</b></div>
</div>
<div class="row">
<div class="c"><div class="sw" style="background:#41390f"></div><span class="lbl">yes-bg</span><span class="val">#41390F</span></div>
<div class="c"><div class="sw" style="background:#fff09c"></div><span class="lbl">yes-fg</span><span class="val">#FFF09C</span></div>
<div class="c"><div class="sw" style="background:#f4e490"></div><span class="lbl">yes-chip</span><span class="val">#F4E490</span></div>
<div class="c"><div class="sw" style="background:#083640"></div><span class="lbl">no-bg</span><span class="val">#083640</span></div>
<div class="c"><div class="sw" style="background:#b2f1ff"></div><span class="lbl">no-fg</span><span class="val">#B2F1FF</span></div>
<div class="c"><div class="sw" style="background:#9bdbea"></div><span class="lbl">no-chip</span><span class="val">#9BDBEA</span></div>
</div>
</body></html>
