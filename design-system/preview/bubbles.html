<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Montserrat:wght@500&display=swap" rel="stylesheet"><style>
@font-face{font-family:"Alimama ShuHeiTi";src:url("../fonts/AlimamaShuHeiTi-Bold.otf") format("opentype");font-weight:700 900;font-display:swap}
body{background:#000;color:#fff;font-family:"PingFang SC","Noto Sans SC",sans-serif;margin:0;padding:28px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:18px}
h4{margin:0 0 6px;font-size:10px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;font-family:Montserrat,sans-serif}
.row{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}

/* ==== chat-bubble (exchange card) ==== */
.bub{width:283px;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px;font-family:"PingFang SC","Noto Sans SC",sans-serif}
.bub.dark{background:rgba(255,255,255,.14);color:#fff}
.bub.light{background:#ffe4be;color:#000}
.bub-title{padding-bottom:12px;border-bottom:0.5px solid rgba(255,255,255,.1);font-size:16px;font-weight:600;line-height:22px}
.bub.light .bub-title{border-bottom-color:rgba(0,0,0,.1);color:#000}
.bub-items{display:flex;flex-direction:column;gap:4px}
.bub-item{display:flex;align-items:center;gap:10px}
.thumb{position:relative;width:54px;height:54px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#2a2a2a}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.owned{position:absolute;left:0;right:0;bottom:0;height:14px;background:rgba(0,0,0,.4);color:#fff;font-size:12px;line-height:14px;text-align:center;font-family:"PingFang SC","Noto Sans SC",sans-serif}
.bub-text{font-size:14px;line-height:22px}
.bub.light .bub-text{color:#000}
.divider{height:22px;margin-left:64px;border-top:0.5px solid rgba(255,255,255,.1)}
.bub.light .divider{border-top-color:rgba(0,0,0,.1)}

/* label under bubble */
.from{font-family:Montserrat,sans-serif;font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.04em;margin-top:6px;text-align:center}

.col{display:flex;flex-direction:column}
</style></head><body>

<div class="row">
  <div class="col">
    <h4>Received · is-dark · rgba(255,255,255,.14)</h4>
    <div class="bub dark">
      <div class="bub-title">申请交换</div>
      <div class="bub-items">
        <div class="bub-item"><div class="thumb"><img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=150&auto=format&fit=crop"></div><span class="bub-text">晚间酒吧的黄光 · 胶片原片</span></div>
        <div class="divider"></div>
        <div class="bub-item"><div class="thumb"><img src="https://images.unsplash.com/photo-1554941426-5b0f5a49a5a3?w=150&auto=format&fit=crop"><span class="owned">我的</span></div><span class="bub-text">拍立得相纸一盒</span></div>
      </div>
    </div>
    <span class="from">来自 阿楼 · 3分钟前</span>
  </div>

  <div class="col">
    <h4>Sent · is-light · #FFE4BE</h4>
    <div class="bub light">
      <div class="bub-title">申请交换</div>
      <div class="bub-items">
        <div class="bub-item"><div class="thumb"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=150&auto=format&fit=crop"></div><span class="bub-text">手冲咖啡壶</span></div>
        <div class="divider"></div>
        <div class="bub-item"><div class="thumb"><img src="https://images.unsplash.com/photo-1542362567-b07e54358753?w=150&auto=format&fit=crop"><span class="owned">我的</span></div><span class="bub-text">小米YU7 一台（想换）</span></div>
      </div>
    </div>
    <span class="from">我 · 5分钟前</span>
  </div>
</div>
</body></html>
