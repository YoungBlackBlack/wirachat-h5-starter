<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
@font-face{font-family:"Alimama ShuHeiTi";src:url("../fonts/AlimamaShuHeiTi-Bold.otf") format("opentype");font-weight:700 900;font-display:swap}

body{background:#000;color:#fff;font-family:"PingFang SC",sans-serif;margin:0;padding:24px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column;gap:16px;justify-content:center}
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.c{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.sw{width:52px;height:52px;border-radius:10px}
.lbl{font-size:11px;color:rgba(255,255,255,.5);font-family:"Montserrat",sans-serif}
.val{font-size:12px;color:#fff;font-weight:600;font-family:"Montserrat",sans-serif}
h4{margin:0;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:.08em;text-transform:uppercase}
.chip{height:28px;border-radius:18px;display:inline-grid;place-items:center;padding:0 10px;font-family:"Alimama ShuHeiTi","Noto Sans SC",sans-serif;font-weight:700;font-size:14px}
</style></head><body>
<h4>Coin / reward</h4>
<div class="row">
<div class="c"><div class="sw" style="background:#45431e"></div><span class="lbl">coin-bg</span><span class="val">#45431E</span></div>
<div class="c"><div class="sw" style="background:#ffe4a4"></div><span class="lbl">coin-fg</span><span class="val">#FFE4A4</span></div>
<div style="background:#45431e;color:#ffe4a4;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600">金币+100</div>
</div>
<h4>Semantic accents</h4>
<div class="row">
<div class="c"><div class="sw" style="background:#ff7300"></div><span class="lbl">tab active</span><span class="val">#FF7300</span></div>
<div class="c"><span class="chip" style="border:1.5px solid #fff;color:#fff">有</span><span class="lbl">have</span></div>
<div class="c"><span class="chip" style="border:1.5px solid #ff8d2f;color:#ff8d2f">换</span><span class="lbl">want · #FF8D2F</span></div>
<div class="c"><div class="sw" style="background:#e8579b"></div><span class="lbl">like</span><span class="val">#E8579B</span></div>
<div class="c"><div class="sw" style="background:#4a9fe8"></div><span class="lbl">dislike</span><span class="val">#4A9FE8</span></div>
<div class="c"><div class="sw" style="background:#ff6b6b"></div><span class="lbl">danger</span><span class="val">#FF6B6B</span></div>
</div>
<h4>Chat bubbles · gender badges</h4>
<div class="row">
<div class="c"><div class="sw" style="background:#ffe2ba"></div><span class="lbl">sent text</span><span class="val">#FFE2BA</span></div>
<div class="c"><div class="sw" style="background:#ffe4be"></div><span class="lbl">card bg</span><span class="val">#FFE4BE</span></div>
<div class="c"><div class="sw" style="background:#ff6fad"></div><span class="lbl">female</span><span class="val">#FF6FAD</span></div>
<div class="c"><div class="sw" style="background:#559cff"></div><span class="lbl">male</span><span class="val">#559CFF</span></div>
<div class="c"><div class="sw" style="background:#9bdbea"></div><span class="lbl">link</span><span class="val">#9BDBEA</span></div>
</div>
</body></html>
